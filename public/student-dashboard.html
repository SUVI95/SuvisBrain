<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knuut — My Progress</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #e0e0f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 24px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 28px;
    }
    .learner-name { font-size: 24px; font-weight: bold; color: #fff; }
    .cefr-badge {
      padding: 6px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
      background: rgba(108,99,255,0.3);
      color: #6C63FF;
      border: 1px solid rgba(108,99,255,0.5);
    }
    .sessions-count { font-size: 14px; color: rgba(255,255,255,0.5); }
    nav { display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap; }
    .nav-link {
      padding: 8px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      text-decoration: none;
      transition: all 0.2s;
    }
    .nav-link:hover { background: rgba(108,99,255,0.2); border-color: #6C63FF; color: #fff; }
    h2 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 16px;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 24px;
    }
    .improvement-badge {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      background: rgba(88,204,2,0.25);
      color: #58CC02;
      margin-bottom: 16px;
    }
    .improvement-badge.negative { background: rgba(255,75,75,0.2); color: #FF4B4B; }
    .improvement-badge.neutral { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); }
    .progress-chart-wrap { width: 100%; height: 180px; margin-bottom: 8px; }
    .progress-bar-wrap { margin-bottom: 14px; position: relative; }
    .progress-bar-wrap:last-child { margin-bottom: 0; }
    .skill-bubble {
      padding: 12px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .skill-bubble:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.2); }
    .skill-bubble:last-child { margin-bottom: 0; }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
      color: rgba(255,255,255,0.7);
    }
    .progress-track {
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 5px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 5px;
      transition: width 0.3s ease;
    }
    .progress-fill.high { background: #58CC02; }
    .progress-fill.medium { background: #FFC800; }
    .progress-fill.low { background: #FF4B4B; }
    .spark-wrap { margin-top: 8px; height: 28px; }
    .skill-tooltip {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%) translateY(-4px);
      background: #fff;
      color: #1a1a1a;
      padding: 12px 16px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      font-size: 12px;
      min-width: 200px;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s, transform 0.15s;
    }
    .skill-bubble:hover .skill-tooltip { opacity: 1; transform: translateX(-50%) translateY(-8px); }
    .skill-tooltip .name { font-weight: bold; margin-bottom: 8px; }
    .skill-tooltip .meta { color: #666; margin-top: 4px; }
    .skill-tooltip .trend { font-size: 14px; margin-top: 6px; }
    .focus-list { list-style: none; }
    .focus-list li {
      padding: 10px 14px;
      margin-bottom: 8px;
      background: rgba(108,99,255,0.1);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
    }
    .focus-list li:last-child { margin-bottom: 0; }
    .session-card {
      padding: 16px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
    }
    .session-card:last-child { margin-bottom: 0; }
    .session-date { font-size: 11px; color: rgba(255,255,255,0.4); margin-bottom: 6px; }
    .session-summary { font-size: 13px; color: rgba(255,255,255,0.8); line-height: 1.5; }
    .session-duration { font-size: 11px; color: #6C63FF; margin-top: 8px; }
    .yki-card {
      padding: 14px 16px;
      margin-bottom: 10px;
      background: rgba(108,99,255,0.08);
      border: 1px solid rgba(108,99,255,0.2);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .yki-card:last-child { margin-bottom: 0; }
    .yki-date { font-size: 12px; color: rgba(255,255,255,0.6); }
    .yki-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; background: rgba(108,99,255,0.3); color: #6C63FF; }
    .yki-pass { background: rgba(88,204,2,0.3); color: #58CC02; }
    .yki-fail { background: rgba(255,75,75,0.2); color: #FF4B4B; }
    .yki-score { font-size: 13px; color: rgba(255,255,255,0.8); }
    .yki-link { font-size: 11px; color: #6C63FF; text-decoration: none; }
    .yki-link:hover { text-decoration: underline; }
    .empty-state { color: rgba(255,255,255,0.4); font-size: 13px; padding: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div>
        <div class="learner-name" id="learner-name">—</div>
        <div class="sessions-count" id="sessions-count">0 sessions</div>
      </div>
      <span class="cefr-badge" id="cefr-badge">A1</span>
    </header>

    <nav>
      <a href="index.html" class="nav-link">Brain Graph</a>
      <a href="dashboard.html" class="nav-link">Agents</a>
      <a href="knuut.html" class="nav-link">Practice with Knuut</a>
      <a href="teacher-dashboard.html" class="nav-link">Teacher view</a>
      <a href="#" class="nav-link" id="logout-link">Log out</a>
    </nav>

    <h2>Your learning curve</h2>
    <div class="card">
      <div class="improvement-badge" id="improvement-badge"></div>
      <div class="progress-chart-wrap">
        <canvas id="overall-chart"></canvas>
      </div>
    </div>

    <h2>Skill progress</h2>
    <div class="card" id="progress-card">
      <div class="empty-state">Loading...</div>
    </div>

    <h2>Next session focus</h2>
    <div class="card" id="focus-card">
      <ul class="focus-list" id="focus-list"></ul>
    </div>

    <h2>Recent sessions</h2>
    <div class="card" id="sessions-card">
      <div class="empty-state">Loading...</div>
    </div>

    <h2>Mock exam history</h2>
    <div class="card" id="yki-card">
      <div class="empty-state">Loading...</div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('knuut_token');
    const user = (() => { try { return JSON.parse(localStorage.getItem('knuut_user') || '{}'); } catch { return {}; } })();
    if (!token || user?.role !== 'learner') {
      location.replace('/login.html?next=' + encodeURIComponent('/student-dashboard.html'));
    }
    const LEARNER_ID = user?.id;

    function authHeaders() {
      return { 'Authorization': 'Bearer ' + (localStorage.getItem('knuut_token') || '') };
    }

    document.getElementById('logout-link')?.addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('knuut_token');
      localStorage.removeItem('knuut_user');
      location.replace('/login.html');
    });

    const COLOR = { high: '#58CC02', medium: '#FFC800', low: '#FF4B4B' };

    function getConfidenceColor(c) {
      return c >= 0.8 ? COLOR.high : c >= 0.4 ? COLOR.medium : COLOR.low;
    }

    function hexToRgba(hex, a) {
      const r = parseInt(hex.slice(1,3), 16), g = parseInt(hex.slice(3,5), 16), b = parseInt(hex.slice(5,7), 16);
      return `rgba(${r},${g},${b},${a})`;
    }

    function sparklineConfig(ctx, history) {
      const data = history.length ? history.map(h => h.score) : [0.5];
      const labels = history.length ? history.map(h => h.date) : [''];
      if (data.length === 1) { data.push(data[0]); labels.push(labels[0] || labels[0]); }
      const c = getConfidenceColor(data[data.length - 1] ?? 0.5);
      const fillColor = c.startsWith('#') ? hexToRgba(c, 0.15) : c.replace(')', ', 0.15)').replace('rgb', 'rgba');
      return new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data,
            borderColor: c,
            backgroundColor: fillColor,
            borderWidth: 1.5,
            pointRadius: 0,
            tension: 0.4,
            fill: true
          }]
        },
        options: {
          responsive: false,
          maintainAspectRatio: false,
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          scales: { x: { display: false }, y: { display: false, min: 0, max: 1 } },
          animation: { duration: 800 }
        }
      });
    }

    function buildOverallChartData(nodes) {
      const dateScores = {};
      for (const n of nodes || []) {
        const hist = n.history || [];
        for (const h of hist) {
          const d = h.date?.slice?.(0, 10) || h.date;
          if (!dateScores[d]) dateScores[d] = [];
          dateScores[d].push(h.score);
        }
      }
      const dates = Object.keys(dateScores).sort();
      const filled = [];
      let lastAvg = 0;
      for (const d of dates) {
        const arr = dateScores[d];
        const avg = arr.reduce((a, b) => a + b, 0) / arr.length;
        lastAvg = avg;
        filled.push({ date: d, avg });
      }
      return filled;
    }

    async function loadStudentDashboard() {
      document.getElementById('learner-name').textContent = '—';
      document.getElementById('cefr-badge').textContent = 'A1';
      document.getElementById('sessions-count').textContent = '0 sessions';

      try {
        const [progressRes, focusRes] = await Promise.all([
          fetch(`/api/learners/${LEARNER_ID}/progress`, { headers: authHeaders() }),
          fetch('/api/session-focus', { headers: authHeaders() }),
        ]);

        if (!progressRes.ok) throw new Error('Progress fetch failed');
        const { learner, nodes, episodes, yki_episodes } = await progressRes.json();

        document.getElementById('learner-name').textContent = learner.name;
        document.getElementById('cefr-badge').textContent = learner.cefr_level || 'A1';
        document.getElementById('sessions-count').textContent =
          (episodes?.length || 0) + ' sessions';

        const progressCard = document.getElementById('progress-card');
        if (nodes && nodes.length > 0) {
          let confettiFired = false;
          progressCard.innerHTML = nodes.map((n, idx) => {
            const c = n.confidence ?? 0.5;
            const pct = Math.round(c * 100);
            const cls = c >= 0.8 ? 'high' : c >= 0.4 ? 'medium' : 'low';
            const hist = n.history || [];
            const firstScore = hist[0]?.score ?? c;
            const lastScore = hist[hist.length - 1]?.score ?? c;
            let trend = '→';
            let trendCls = 'gray';
            if (hist.length >= 2) {
              if (lastScore > firstScore + 0.05) { trend = '↑'; trendCls = 'green'; }
              else if (lastScore < firstScore - 0.05) { trend = '↓'; trendCls = 'red'; }
            }
            const sessionsAgo = hist.length;
            return `
              <div class="skill-bubble" data-idx="${idx}">
                <div class="skill-tooltip">
                  <div class="name">${n.label}</div>
                  ${hist.length ? `<div class="meta">${sessionsAgo} sessions ago: ${Math.round(firstScore * 100)}%</div>` : ''}
                  <div class="meta">Now: ${pct}%</div>
                  <div class="trend" style="color:${trendCls==='green'?'#58CC02':trendCls==='red'?'#FF4B4B':'#888'}">${trend}</div>
                </div>
                <div class="progress-label">
                  <span>${n.label}</span>
                  <span>${pct}%</span>
                </div>
                <div class="progress-track">
                  <div class="progress-fill ${cls}" style="width:${pct}%"></div>
                </div>
                <div class="spark-wrap"><canvas width="80" height="28" data-idx="${idx}"></canvas></div>
              </div>`;
          }).join('');

          nodes.forEach((n) => {
            if (!confettiFired && (n.confidence ?? 0) >= 0.85 && (n.history?.length || 0) > 0) {
              confettiFired = true;
              if (typeof confetti === 'function') confetti({ particleCount: 80, spread: 60 });
            }
          });
          setTimeout(() => {
            nodes.forEach((n, idx) => {
              const canvas = progressCard.querySelector(`canvas[data-idx="${idx}"]`);
              if (canvas && Chart) {
                const hist = n.history || [];
                const ctx = canvas.getContext('2d');
                sparklineConfig(ctx, hist);
              }
            });
          }, 50);
        } else {
          progressCard.innerHTML = '<div class="empty-state">No skill data yet. Practice with Knuut!</div>';
        }

        const overallData = buildOverallChartData(nodes);
        const improveEl = document.getElementById('improvement-badge');
        if (overallData.length >= 2) {
          const first = overallData[0].avg * 100;
          const last = overallData[overallData.length - 1].avg * 100;
          const diff = Math.round(last - first);
          improveEl.textContent = diff > 0 ? `+${diff}% since you started 🚀` : (diff < 0 ? `${diff}%` : 'Steady progress');
          improveEl.className = 'improvement-badge' + (diff > 0 ? '' : (diff < 0 ? ' negative' : ' neutral'));
        } else {
          improveEl.textContent = 'Start practicing to see your progress!';
          improveEl.className = 'improvement-badge neutral';
        }

        const chartEl = document.getElementById('overall-chart');
        if (Chart && chartEl && overallData.length > 0) {
          const ctx = chartEl.getContext('2d');
          new Chart(ctx, {
            type: 'line',
            data: {
              labels: overallData.map(d => {
                const dt = new Date(d.date);
                return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
              }),
              datasets: [{
                data: overallData.map(d => d.avg * 100),
                borderColor: '#6C63FF',
                backgroundColor: 'rgba(108,99,255,0.2)',
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 2
              }]
            },
            options: {
              responsive: true,
              maintainAspectRatio: false,
              plugins: { legend: { display: false } },
              scales: {
                x: { grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)', maxTicksLimit: 8 } },
                y: { min: 0, max: 100, grid: { color: 'rgba(255,255,255,0.06)' }, ticks: { color: 'rgba(255,255,255,0.5)', callback: v => v + '%' } }
              },
              animation: { duration: 1200 }
            }
          });
        }

        const focusData = await focusRes.json();
        const focusList = document.getElementById('focus-list');
        const topics = (focusData.focus_topics || []).slice(0, 3);
        if (topics.length > 0) {
          focusList.innerHTML = topics.map((t) => `<li>${t.label}</li>`).join('');
        } else {
          focusList.innerHTML = '<li class="empty-state">All topics mastered. Try advanced practice!</li>';
        }

        const sessionsCard = document.getElementById('sessions-card');
        if (episodes && episodes.length > 0) {
          const recent = episodes.slice(0, 5);
          sessionsCard.innerHTML = recent.map((e) => `
            <div class="session-card">
              <div class="session-date">${new Date(e.created_at).toLocaleDateString('fi-FI')}</div>
              <div class="session-summary">${e.summary || '—'}</div>
              <div class="session-duration">${e.duration_s || 0} min</div>
            </div>
          `).join('');
        } else {
          sessionsCard.innerHTML = '<div class="empty-state">No sessions yet. Start practicing with Knuut!</div>';
        }

        const ykiCard = document.getElementById('yki-card');
        const ykiList = yki_episodes || [];
        if (ykiList.length > 0) {
          ykiCard.innerHTML = ykiList.map((e) => {
            const meta = e.metadata || {};
            const score = meta.yki_score || meta;
            const ov = typeof score === 'object' ? score.overall_score : meta.cefr_score;
            const result = (typeof score === 'object' ? score.yki_result : null) || (meta.cefr_score ? 'pass' : '');
            const cefr = (typeof score === 'object' ? score.cefr_level : null) || meta.cefr_score || '—';
            return `
              <div class="yki-card">
                <div>
                  <div class="yki-date">${new Date(e.created_at).toLocaleDateString('fi-FI')}</div>
                  <span class="yki-badge ${result === 'fail' ? 'yki-fail' : 'yki-pass'}">${cefr}</span>
                  <span class="yki-score">${ov != null ? ov + '/100' : ''}</span>
                </div>
                <a href="/yki-results.html?episode=${e.id}" class="yki-link">View report</a>
              </div>`;
          }).join('');
        } else {
          ykiCard.innerHTML = '<div class="empty-state">No mock exams yet. Try YKI mode in Knuut!</div>';
        }
      } catch (err) {
        console.error(err);
        document.getElementById('progress-card').innerHTML =
          '<div class="empty-state">Could not load. Is the server running?</div>';
      }
    }

    loadStudentDashboard();
  </script>
</body>
</html>
