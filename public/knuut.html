<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knuut AI — Language Teacher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d0d1a;
      color: #e0e0f0;
      overflow-x: hidden;
      min-height: 100vh;
      transition: background 0.3s;
    }
    body.yki-mode { background: #FFFBF0; color: #1a1a1a; }
    body.yki-mode .nav-link, body.yki-mode .subtitle { color: rgba(0,0,0,0.7); }
    body.yki-mode .nav-link:hover { color: #000; }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .orb-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    .content-overlay {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      max-width: 800px;
    }
    .nav-row {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 20;
      justify-content: flex-start;
    }
    .nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      text-decoration: none;
      transition: all 0.15s;
      font-family: inherit;
    }
    .nav-link:hover {
      background: rgba(167,139,250,0.2);
      border-color: #a78bfa;
      color: #fff;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a78bfa, #1d9e75);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .talk-button {
      padding: 18px 40px;
      font-size: 1.3rem;
      font-weight: bold;
      background: linear-gradient(135deg, #a78bfa, #1d9e75);
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(167,139,250,0.3);
      font-family: inherit;
      z-index: 20;
    }
    .talk-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(167,139,250,0.4);
    }
    .talk-button.active {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 8px 32px rgba(239,68,68,0.4);
    }
    .talk-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    #voice-bars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin: 2rem 0;
      height: 50px;
    }
    .vb {
      width: 5px;
      height: 18px;
      background: #1d9e75;
      border-radius: 3px;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }
    .status-text {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      min-height: 24px;
    }
    .status-text.active {
      color: #1d9e75;
    }
    .mode-tabs {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4px;
      margin-bottom: 16px;
    }
    body.yki-mode .mode-tabs { background: rgba(0,0,0,0.08); }
    .mode-tab {
      padding: 8px 20px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-family: inherit;
    }
    body.yki-mode .mode-tab { color: rgba(0,0,0,0.5); }
    .mode-tab.active {
      background: linear-gradient(135deg, #a78bfa, #1d9e75);
      color: #fff;
    }
    body.yki-mode .mode-tab.active { background: #6C63FF; }
    .mode-tab:not(.active):hover { color: #fff; }
    body.yki-mode .mode-tab:not(.active):hover { color: #000; }
    .yki-banner {
      display: none;
      background: linear-gradient(135deg, #6C63FF, #5a52e0);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      margin-bottom: 16px;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .yki-banner.visible { display: flex; flex-wrap: wrap; }
    .yki-banner .timer { font-size: 20px; font-weight: bold; }
    .yki-banner .timer.warn { color: #FF4B4B; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .session-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .session-overlay.visible { display: flex; }
    .overlay-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .overlay-card h2 { font-size: 22px; margin-bottom: 8px; color: #1A1A2E; font-family: system-ui,sans-serif; }
    .overlay-card .badge { font-size: 32px; font-weight: bold; color: #6C63FF; margin: 16px 0; }
    .overlay-check {
      width: 80px; height: 80px; margin: 0 auto 20px;
    }
    .overlay-check circle, .overlay-check path {
      fill: none; stroke: #58CC02; stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .overlay-check circle { stroke-dasharray: 283; stroke-dashoffset: 283; animation: drawCircle 0.6s ease forwards; }
    .overlay-check path { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawCheck 0.4s ease 0.5s forwards; }
    @keyframes drawCircle { to { stroke-dashoffset: 0; } }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    .overlay-stats { display: flex; gap: 20px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
    .overlay-stat { font-size: 14px; color: #6B7280; }
    .overlay-summary { font-style: italic; color: #6B7280; font-size: 14px; max-width: 360px; margin: 0 auto 24px; line-height: 1.5; }
    .overlay-card .btn {
      display: inline-block;
      padding: 14px 28px;
      margin: 8px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      box-shadow: 0 4px 0 #4B44CC;
      transition: transform 0.15s;
    }
    .overlay-card .btn:hover { transform: translateY(-1px); }
    .overlay-card .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #4B44CC; }
    .overlay-card .btn-primary { background: #6C63FF; color: #fff; }
    .overlay-card .btn-success { background: #58CC02; color: #fff; box-shadow: 0 4px 0 #3da001; }
    .learning-card {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 320px;
      max-width: calc(100vw - 48px);
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
      padding: 20px;
      z-index: 1000;
      border: 1px solid rgba(0,0,0,0.08);
      animation: cardSlide 0.3s ease;
    }
    body.yki-mode .learning-card { box-shadow: 0 12px 40px rgba(0,0,0,0.15); }
    @keyframes cardSlide {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .learning-card h3 { font-size: 14px; color: #6B7280; margin-bottom: 8px; font-weight: 600; }
    .learning-card .card-word { font-size: 22px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .learning-card .card-hint { font-size: 13px; color: #6B7280; margin-bottom: 12px; }
    .learning-card .card-hint-wrap { margin-bottom: 8px; }
    .learning-card input {
      width: 100%;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 12px;
      font-family: inherit;
    }
    .learning-card input:focus { outline: none; border-color: #a78bfa; box-shadow: 0 0 0 2px rgba(167,139,250,0.2); }
    .learning-card .card-actions { display: flex; gap: 8px; }
    .learning-card button {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      font-family: inherit;
    }
    .learning-card .btn-save { background: linear-gradient(135deg, #a78bfa, #1d9e75); color: #fff; }
    .learning-card .btn-close { background: #f3f4f6; color: #4b5563; }
    .learning-card .btn-save:hover { opacity: 0.9; }
    .learning-card .btn-close:hover { background: #e5e7eb; }
    .learning-card.feedback-correct input { border-color: #22c55e; }
    .learning-card.feedback-wrong input { border-color: #ef4444; }
    .learning-card .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .learning-card .btn-repeat {
      padding: 6px 10px;
      font-size: 12px;
      background: rgba(167,139,250,0.2);
      border: 1px solid #a78bfa;
      border-radius: 8px;
      color: #a78bfa;
      cursor: pointer;
      font-family: inherit;
    }
    .learning-card .btn-repeat:hover { background: rgba(167,139,250,0.3); }
    .learning-card .btn-reveal {
      padding: 6px 12px;
      font-size: 12px;
      background: transparent;
      border: 1px dashed #9ca3af;
      border-radius: 6px;
      color: #6B7280;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 8px;
    }
    .learning-card .btn-reveal:hover { background: #f3f4f6; }
    .learning-card .card-feedback { margin-bottom: 10px; font-size: 14px; }
    .learning-card .card-feedback.feedback-correct { color: #22c55e; font-weight: 600; }
    .learning-card .card-feedback.feedback-wrong { color: #6B7280; }
    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; }
      .subtitle { font-size: 0.95rem; }
      .talk-button { padding: 14px 28px; font-size: 1.1rem; }
      .learning-card { right: 16px; bottom: 16px; width: calc(100vw - 32px); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-row">
      <a href="index.html" class="nav-link">Brain Graph</a>
      <a href="dashboard.html" class="nav-link">Agents</a>
      <a href="student-dashboard.html" class="nav-link">My Progress</a>
      <a href="teacher-dashboard.html" class="nav-link">Teacher</a>
    </div>
    <div class="orb-container" id="orb-root"></div>
    <div class="content-overlay">
      <h1>KNUUT AI</h1>
      <p class="subtitle">Your voice teacher — speak any language. Practice with Knuut and get gentle corrections in real time.</p>
      <div id="voice-bars">
        <div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div>
        <div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div>
        <div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="free">Free practice</button>
        <button class="mode-tab" data-mode="yki">YKI exam mode</button>
      </div>
      <div class="yki-banner" id="yki-banner">
        <span>YKI Exam Mode — B1 level</span>
        <span class="timer" id="yki-timer">15:00</span>
      </div>
      <button id="knuut-talk-btn" class="talk-button">Talk with Knuut</button>
      <div id="status-text" class="status-text"></div>
    </div>
  </div>

  <div id="learning-cards-container"></div>

  <div class="session-overlay" id="session-overlay">
    <div class="overlay-card">
      <svg class="overlay-check" viewBox="0 0 80 80" id="overlay-check">
        <circle cx="40" cy="40" r="36"/>
        <path d="M22 40 L35 53 L58 27"/>
      </svg>
      <h2 id="overlay-title">Session complete!</h2>
      <div class="overlay-stats" id="overlay-stats"></div>
      <p class="overlay-summary" id="overlay-summary"></p>
      <div id="overlay-buttons"></div>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    (function(){
      const btn = document.getElementById('knuut-talk-btn');
      const statusText = document.getElementById('status-text');
      if (!btn) return;

      const token = localStorage.getItem('sb_token') || localStorage.getItem('knuut_token');
      const user = (() => { try { return JSON.parse(localStorage.getItem('sb_user') || localStorage.getItem('knuut_user') || '{}'); } catch { return {}; } })();
      if (!token) {
        location.replace('/login.html?next=' + encodeURIComponent('/knuut.html' + location.search));
        return;
      }
      const params = new URLSearchParams(location.search);
      const urlLearnerId = params.get('learner_id');
      const learnerId = urlLearnerId || (user?.role === 'learner' ? user?.id : null);
      const dashboardMode = params.get('mode') || null;
      const reviewWordsParam = params.get('review_words');
      let reviewWords = [];
      if (dashboardMode === 'review') {
        try {
          reviewWords = reviewWordsParam ? JSON.parse(decodeURIComponent(reviewWordsParam)) : JSON.parse(localStorage.getItem('sb_review_words') || '[]');
        } catch (e) { reviewWords = []; }
      }

      function authHeaders() {
        return { 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || localStorage.getItem('knuut_token') || '') };
      }

      let pc, micStream, remoteAudioEl, isActive = false, isStarting = false;
      let sessionTranscript = '';
      let sessionStartTime = 0;
      let examMode = false;
      let cardQueue = [];
      let currentCardId = null;
      var cardIdCounter = 0;
      var knuutTranscriptBuffer = '';
      var oaiChannel = null;

      function extractAllCards(text) {
        if (!text || typeof text !== 'string') return [];
        if (text.indexOf('[[END_CARD]]') === -1) return [];
        var re = /\[\[CARD\]\]([\s\S]*?)\[\[END_CARD\]\]/g;
        var cards = [];
        var m;
        while ((m = re.exec(text)) !== null) {
          var content = m[1];
          var word = (content.match(/word:\s*(.+?)(?:\n|$)/) || [])[1];
          var hint = (content.match(/translation_hint:\s*(.+?)(?:\n|$)/) || [])[1];
          var type = (content.match(/type:\s*(.+?)(?:\n|$)/) || [])[1];
          if (word) {
            word = word.trim();
            cards.push({
              word: word,
              translation_hint: hint ? hint.trim() : '',
              type: type ? type.trim() : 'word'
            });
          }
        }
        return cards;
      }

      function addCardsToQueue(cards) {
        for (var i = 0; i < cards.length; i++) {
          var c = cards[i];
          var exists = cardQueue.some(function(q) { return q.card.word === c.word; });
          if (!exists) cardQueue.push({ id: null, card: c });
        }
        showNextCardInQueue();
      }

      function showNextCardInQueue() {
        if (currentCardId) return;
        if (cardQueue.length === 0) return;
        var next = cardQueue.shift();
        var id = 'card-' + (++cardIdCounter);
        next.id = id;
        currentCardId = id;
        renderLearningCard(id, next.card);
      }

      function showLearningCard(card) {
        addCardsToQueue([card]);
      }

      function closeLearningCard(cardId) {
        var el = document.querySelector('[data-card-id="' + cardId + '"]');
        var word = el ? el.getAttribute('data-card-word') : null;
        currentCardId = null;
        var container = document.getElementById('learning-cards-container');
        if (container && el) el.remove();
        if (word) notifyCardClosed(word);
        showNextCardInQueue();
      }

      function notifyCardClosed(word) {
        if (!oaiChannel || oaiChannel.readyState !== 'open') return;
        try {
          oaiChannel.send(JSON.stringify({
            type: 'conversation.item.create',
            item: {
              type: 'message',
              role: 'user',
              content: [{ type: 'input_text', text: 'Kortti "' + word + '" suljettu. Voit opettaa seuraavan sanan ja näyttää seuraavan kortin.' }]
            }
          }));
          oaiChannel.send(JSON.stringify({
            type: 'response.create',
            response: { modalities: ['audio', 'text'], conversation: 'auto' }
          }));
        } catch (e) { console.error('Notify card closed failed:', e); }
      }

      function normalizeForCompare(s) {
        return (s || '').toLowerCase().replace(/\s+/g, ' ').trim();
      }

      function renderLearningCard(id, card) {
        var container = document.getElementById('learning-cards-container');
        if (!container) return;
        var wrap = document.createElement('div');
        wrap.className = 'learning-card';
        wrap.setAttribute('data-card-id', id);
        wrap.setAttribute('data-card-word', card.word);
        wrap.innerHTML = '<div class="learning-card-inner"></div>';
        var inner = wrap.querySelector('.learning-card-inner');
        var hintHtml = card.translation_hint
          ? '<div class="card-hint-wrap"><div class="card-hint" style="display:none">' + escapeHtml(card.translation_hint) + '</div><button type="button" class="btn-reveal">Reveal hint</button></div>'
          : '';
        inner.innerHTML = '<div class="card-header"><h3>New word</h3><button type="button" class="btn-repeat" title="Repeat after me">Repeat</button></div>' +
          '<div class="card-word">' + escapeHtml(card.word) + '</div>' +
          hintHtml +
          '<input type="text" placeholder="What does this mean?" data-card-input />' +
          '<div class="card-feedback" style="display:none"></div>' +
          '<div class="card-actions"><button class="btn-check">Check</button><button class="btn-save" style="display:none">Save</button><button class="btn-close">Close</button></div>';
        var input = inner.querySelector('input');
        var btnCheck = inner.querySelector('.btn-check');
        var btnSave = inner.querySelector('.btn-save');
        var btnClose = inner.querySelector('.btn-close');
        var btnRepeat = inner.querySelector('.btn-repeat');
        var feedbackEl = inner.querySelector('.card-feedback');
        var hintEl = inner.querySelector('.card-hint');
        var revealBtn = inner.querySelector('.btn-reveal');
        btnClose.onclick = function() { closeLearningCard(id); };
        if (btnRepeat) btnRepeat.onclick = function() { requestRepeat(card.word); };
        if (revealBtn && hintEl) {
          revealBtn.onclick = function() {
            if (hintEl.style.display === 'none') {
              hintEl.style.display = 'block';
              hintEl.style.marginTop = '6px';
              revealBtn.textContent = 'Hide hint';
            } else {
              hintEl.style.display = 'none';
              revealBtn.textContent = 'Reveal hint';
            }
          };
        }
        btnCheck.onclick = function() {
          var answer = input ? input.value.trim() : '';
          var hintNorm = normalizeForCompare(card.translation_hint);
          var ansNorm = normalizeForCompare(answer);
          var correct = hintNorm && ansNorm && (hintNorm.indexOf(ansNorm) !== -1 || ansNorm.indexOf(hintNorm) !== -1 || hintNorm === ansNorm);
          feedbackEl.style.display = 'block';
          if (correct) {
            feedbackEl.textContent = 'Correct!';
            feedbackEl.className = 'card-feedback feedback-correct';
          } else {
            feedbackEl.innerHTML = 'Answer: <strong>' + escapeHtml(card.translation_hint || 'N/A') + '</strong>';
            feedbackEl.className = 'card-feedback feedback-wrong';
          }
          requestCardFeedback(card.word, answer);
          btnCheck.style.display = 'none';
          btnSave.style.display = 'inline-block';
        };
        btnSave.onclick = function() {
          var answer = input ? input.value.trim() : '';
          var hintNorm = normalizeForCompare(card.translation_hint);
          var ansNorm = normalizeForCompare(answer);
          var correct = hintNorm && ansNorm && (hintNorm.indexOf(ansNorm) !== -1 || ansNorm.indexOf(hintNorm) !== -1 || hintNorm === ansNorm);
          saveCardToBrain({ word: card.word, answer: answer, translation_hint: card.translation_hint, type: card.type, correct: correct }, id);
        };
        container.appendChild(wrap);
      }

      function escapeHtml(s) {
        if (!s) return '';
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
      }

      async function saveCardToBrain(data, cardId) {
        try {
          var res = await fetch(SERVER_URL + '/api/save-card', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || localStorage.getItem('knuut_token') || '') },
            body: JSON.stringify({ word: data.word, answer: data.answer, translation_hint: data.translation_hint, type: data.type, correct: data.correct, learner_id: learnerId })
          });
          var result = await res.json();
          if (result.success) {
            var wrap = document.querySelector('[data-card-id="' + cardId + '"]');
            if (wrap) wrap.classList.add('feedback-correct');
            showToast('Saved to brain!');
            setTimeout(function() { closeLearningCard(cardId); }, 800);
          } else {
            var w = document.querySelector('[data-card-id="' + cardId + '"]');
            if (w) w.classList.add('feedback-wrong');
          }
        } catch (err) {
          console.error('Save card failed:', err);
          showToast('Could not save');
        }
      }

      function checkTranscriptForCards(text) {
        if (!text) return;
        knuutTranscriptBuffer += text;
        if (knuutTranscriptBuffer.length > 10000) knuutTranscriptBuffer = knuutTranscriptBuffer.slice(-8000);
        var cards = extractAllCards(knuutTranscriptBuffer);
        if (cards.length > 0) addCardsToQueue(cards);
      }

      function requestCardFeedback(word, userAnswer) {
        if (!oaiChannel || oaiChannel.readyState !== 'open') return;
        try {
          var msg = 'Kortin vastaus: sana "' + word + '", opiskelija kirjoitti "' + (userAnswer || '') + '". Anna lyhyt palaute.';
          oaiChannel.send(JSON.stringify({
            type: 'conversation.item.create',
            item: {
              type: 'message',
              role: 'user',
              content: [{ type: 'input_text', text: msg }]
            }
          }));
          oaiChannel.send(JSON.stringify({
            type: 'response.create',
            response: { modalities: ['audio', 'text'], conversation: 'auto' }
          }));
        } catch (e) { console.error('Card feedback send failed:', e); }
      }

      function requestRepeat(word) {
        if (!oaiChannel || oaiChannel.readyState !== 'open') return;
        try {
          oaiChannel.send(JSON.stringify({
            type: 'conversation.item.create',
            item: {
              type: 'message',
              role: 'user',
              content: [{ type: 'input_text', text: 'Sano uudestaan: ' + word }]
            }
          }));
          oaiChannel.send(JSON.stringify({
            type: 'response.create',
            response: { modalities: ['audio', 'text'], conversation: 'auto' }
          }));
        } catch (e) { console.error('Repeat send failed:', e); }
      }
      let ykiTimeLeft = 15 * 60;
      let ykiTimerInterval = null;
      const SERVER_URL = window.location.origin;

      document.querySelectorAll('.mode-tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          if (isActive) return;
          document.querySelectorAll('.mode-tab').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          examMode = btn.dataset.mode === 'yki';
          document.body.classList.toggle('yki-mode', examMode);
          document.getElementById('yki-banner').classList.toggle('visible', examMode && isActive);
        });
      });

      function updateTimerDisplay(secs) {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        const el = document.getElementById('yki-timer');
        if (el) {
          el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
          el.classList.toggle('warn', secs <= 120);
        }
      }

      function showToast(msg, type) {
        const t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
      }

      async function getSessionFocus() {
        try {
          const url = learnerId ? '/api/session-focus?learner_id=' + encodeURIComponent(learnerId) : '/api/session-focus';
          const res = await fetch(url, { headers: authHeaders() });
          const data = await res.json();
          return {
            fragment: data.system_prompt_fragment || '',
            focusTopics: (data.focus_topics || []).map(function(t) { return t.label || t; })
          };
        } catch (err) {
          return { fragment: '', focusTopics: [] };
        }
      }

      async function onSessionEnd() {
        const duration = Math.round((Date.now() - sessionStartTime) / 1000);
        if (sessionTranscript.length < 50) return;

        try {
          const body = {
            transcript: sessionTranscript,
            duration_s: duration,
            learner_language: 'fi',
            is_mock_exam: examMode,
            is_yki_exam: examMode
          };
          if (learnerId) body.learner_id = learnerId;

          const res = await fetch('/api/session-complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeaders() },
            body: JSON.stringify(body)
          });
          const result = await res.json();
          console.log('Session saved:', result.summary);

          if (examMode) {
            let ykiResult = null;
            try {
              const scoreRes = await fetch('/api/yki-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...authHeaders() },
                body: JSON.stringify({ transcript: sessionTranscript, learner_id: learnerId, episode_id: result.episode_id })
              });
              ykiResult = await scoreRes.json();
            } catch (e) { console.error('YKI score failed:', e); }

            showSessionOverlay(true, result, ykiResult, duration);
          } else {
            showSessionOverlay(false, result, null, duration);
          }
          if (result.topics_updated || result.new_nodes_created) {
            console.log('Brain updated:', result.topics_updated, 'nodes,', result.new_nodes_created, 'new');
          }
        } catch (err) {
          console.error('Failed to save session:', err);
          showSessionOverlay(false, { summary: 'Error saving session' }, null, 0);
        }
        sessionTranscript = '';
      }

      function showSessionOverlay(isYki, result, ykiScore, durationSecs) {
        const overlay = document.getElementById('session-overlay');
        const check = document.getElementById('overlay-check');
        const title = document.getElementById('overlay-title');
        const stats = document.getElementById('overlay-stats');
        const summary = document.getElementById('overlay-summary');
        const buttons = document.getElementById('overlay-buttons');
        check.style.display = isYki ? 'none' : 'block';
        overlay.classList.add('visible');
        const close = () => overlay.classList.remove('visible');
        const esc = (e) => { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); } };
        document.addEventListener('keydown', esc);
        overlay.onclick = (e) => { if (e.target === overlay) close(); };
        if (isYki && ykiScore) {
          const passed = (ykiScore.yki_result || '').includes('pass') && !(ykiScore.yki_result || '').includes('fail');
          title.textContent = 'Exam complete! Your result: ' + (passed ? 'PASS' : 'FAIL');
          stats.innerHTML = '';
          summary.textContent = result.summary || '';
          summary.style.display = 'block';
          buttons.innerHTML = `
            <a href="/yki-results.html?episode=${result.episode_id}" class="btn btn-primary">See full report</a>
            <a href="/knuut.html" class="btn btn-success">Practice weak areas</a>
          `;
        } else {
          title.textContent = 'Session complete!';
          const m = Math.floor((durationSecs || result.duration_s || 0) / 60);
          const s = (durationSecs || result.duration_s || 0) % 60;
          stats.innerHTML = `
            <span class="overlay-stat">⏱ ${m}m ${s}s</span>
            <span class="overlay-stat">🧠 ${result.topics_updated || 0} topics practiced</span>
            <span class="overlay-stat">✨ ${result.new_nodes_created || 0} new topics</span>
          `;
          stats.style.display = 'flex';
          summary.textContent = result.summary || '';
          summary.style.display = 'block';
          buttons.innerHTML = `
            <a href="/knuut.html" class="btn btn-primary">Practice again</a>
            <a href="/student-dashboard.html" class="btn btn-success">See my progress</a>
          `;
        }
      }

      function hideSessionOverlay() {
        document.getElementById('session-overlay').classList.remove('visible');
      }

      function updateStatus(text, isActive = false) {
        if (statusText) {
          statusText.textContent = text;
          statusText.className = 'status-text' + (isActive ? ' active' : '');
        }
      }

      async function startKnuut(){
        if (isActive || isStarting) return;
        examMode = document.querySelector('.mode-tab[data-mode="yki"]')?.classList.contains('active');
        document.body.classList.toggle('yki-mode', examMode);
        document.getElementById('yki-banner').classList.toggle('visible', examMode);
        ykiTimeLeft = 15 * 60;
        updateTimerDisplay(ykiTimeLeft);
        isStarting = true;
        btn.disabled = true;
        updateStatus(examMode ? 'Connecting (YKI exam mode)...' : 'Connecting...');

        try {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          updateStatus('Microphone connected');

          pc = new RTCPeerConnection({
            iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
          });

          if (!remoteAudioEl) {
            remoteAudioEl = document.createElement('audio');
            remoteAudioEl.autoplay = true;
            remoteAudioEl.playsInline = true;
            document.body.appendChild(remoteAudioEl);
          }

          pc.ontrack = (event) => {
            const audioEl = document.createElement('audio');
            audioEl.autoplay = true;
            audioEl.playsInline = true;
            audioEl.srcObject = event.streams[0];
            document.body.appendChild(audioEl);
            audioEl.play()
              .then(() => updateStatus('Listening...', true))
              .catch(() => {});
            try {
              const bars = document.querySelectorAll('#voice-bars .vb');
              const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
              const src2 = ctx2.createMediaStreamSource(event.streams[0]);
              const analyser2 = ctx2.createAnalyser();
              analyser2.fftSize = 256;
              src2.connect(analyser2);
              const buf2 = new Uint8Array(analyser2.frequencyBinCount);
              const tick2 = () => {
                analyser2.getByteFrequencyData(buf2);
                const level2 = buf2.reduce((a,b)=>a+b,0) / (buf2.length*255);
                bars.forEach((el, i) => {
                  const scale = 0.5 + Math.min(1, level2*5) * (0.9 + 0.5*Math.cos((Date.now()/100)+i));
                  el.style.transform = 'scaleY(' + scale.toFixed(2) + ')';
                  el.style.transformOrigin = 'bottom';
                  el.style.opacity = (0.8 + level2*0.2).toFixed(2);
                });
                requestAnimationFrame(tick2);
              };
              tick2();
            } catch {}
          };

          pc.oniceconnectionstatechange = () => {
            if (pc.iceConnectionState === 'connected') updateStatus('Connected', true);
          };

          micStream.getTracks().forEach(t => pc.addTrack(t, micStream));

          try {
            const bars = document.querySelectorAll('#voice-bars .vb');
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const src = ctx.createMediaStreamSource(micStream);
            const analyser = ctx.createAnalyser();
            analyser.fftSize = 256;
            src.connect(analyser);
            const buf = new Uint8Array(analyser.frequencyBinCount);
            const tick = () => {
              analyser.getByteFrequencyData(buf);
              const level = buf.reduce((a,b)=>a+b,0) / (buf.length*255);
              bars.forEach((el, i) => {
                const scale = 0.4 + Math.min(1, level*4) * (0.6 + 0.4*Math.sin((Date.now()/120)+i));
                el.style.transform = 'scaleY(' + scale.toFixed(2) + ')';
                el.style.transformOrigin = 'bottom';
                el.style.opacity = (0.7 + level*0.3).toFixed(2);
              });
              requestAnimationFrame(tick);
            };
            tick();
          } catch {}

          sessionTranscript = '';
          sessionStartTime = Date.now();
          cardQueue = [];
          currentCardId = null;
          knuutTranscriptBuffer = '';
          var cc = document.getElementById('learning-cards-container');
          if (cc) cc.innerHTML = '';

          let sessionInstructions = '';
          oaiChannel = pc.createDataChannel('oai-events');
          const channel = oaiChannel;
          channel.onopen = function() {
            if (sessionInstructions) {
              try {
                channel.send(JSON.stringify({
                  type: 'session.update',
                  session: { instructions: sessionInstructions, voice: 'verse' }
                }));
              } catch (e) {}
            }
            try {
              channel.send(JSON.stringify({
                type: 'response.create',
                response: { modalities: ['audio','text'], conversation: 'auto' }
              }));
            } catch (e) {}
          };
          channel.onmessage = function(event) {
            try {
              const obj = JSON.parse(event.data || '{}');
              const t = obj.transcript || obj.item?.transcript;
              if (obj.type === 'response.output_audio_transcript.done' && t) {
                sessionTranscript += '\n[Knuut]: ' + t;
                checkTranscriptForCards(t);
              }
              if (obj.type === 'response.output_text.delta' && obj.delta) {
                knuutTranscriptBuffer += obj.delta;
                if (knuutTranscriptBuffer.length > 10000) knuutTranscriptBuffer = knuutTranscriptBuffer.slice(-8000);
                var cards = extractAllCards(knuutTranscriptBuffer);
                if (cards.length > 0) addCardsToQueue(cards);
              }
              if (obj.type === 'response.output_item.done' && obj.item?.content) {
                var textParts = [];
                var parts = obj.item.content || [];
                for (var i = 0; i < parts.length; i++) {
                  var p = parts[i];
                  if (p && (p.text || p.transcript)) textParts.push(p.text || p.transcript || '');
                }
                var fullText = textParts.join('');
                if (fullText) {
                  sessionTranscript += '\n[Knuut]: ' + fullText;
                  checkTranscriptForCards(fullText);
                }
              }
              if (obj.type === 'conversation.item.input_audio_transcription.completed' && t) {
                sessionTranscript += '\n[Learner]: ' + t;
              }
            } catch (e) {}
          };

          try { pc.addTransceiver('audio', { direction: 'sendrecv' }); } catch {}

          const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: false });
          await pc.setLocalDescription(offer);

          const focusData = await getSessionFocus();
          let focusTopics = focusData.focusTopics || [];
          const urlTopic = params.get('topic');
          if ((dashboardMode === 'writing' || dashboardMode === 'learn') && urlTopic) {
            focusTopics = [decodeURIComponent(urlTopic)].concat(focusTopics.filter(function(t) { return t !== urlTopic; })).slice(0, 5);
          }
          const sessionBody = {
            sdp: offer.sdp || '',
            learner_id: learnerId || undefined,
            mode: examMode ? 'yki' : 'regular',
            focusTopics: focusTopics
          };
          if (dashboardMode) sessionBody.dashboard_mode = dashboardMode;
          if (reviewWords.length > 0) sessionBody.review_words = reviewWords;
          const resp = await fetch(SERVER_URL + '/api/session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(sessionBody)
          });

          if (!resp.ok) {
            const errText = await resp.text();
            throw new Error('Session failed: ' + errText);
          }

          const data = await resp.json();
          const answerSdp = typeof data.answer === 'string' ? data.answer : (data.sdp || '');
          sessionInstructions = data.instructions || '';
          await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
          try { await remoteAudioEl.play(); } catch {}

          isActive = true;
          btn.textContent = 'Stop Knuut';
          btn.classList.add('active');
          updateStatus('Ready to talk', true);

          if (examMode) {
            ykiTimerInterval = setInterval(() => {
              ykiTimeLeft--;
              updateTimerDisplay(ykiTimeLeft);
              if (ykiTimeLeft === 120) showToast('2 minutes remaining', 'warning');
              if (ykiTimeLeft <= 0) {
                clearInterval(ykiTimerInterval);
                stopKnuut();
              }
            }, 1000);
          }
        } catch (e) {
          console.error(e);
          stopKnuut();
          updateStatus('Error: ' + (e && e.message ? e.message : 'Unknown'));
          alert('Could not start: ' + (e && e.message ? e.message : e));
        } finally {
          isStarting = false;
          btn.disabled = false;
        }
      }

      function stopKnuut(){
        if (ykiTimerInterval) { clearInterval(ykiTimerInterval); ykiTimerInterval = null; }
        document.getElementById('yki-banner').classList.remove('visible');
        document.body.classList.remove('yki-mode');
        onSessionEnd();
        isActive = false;
        btn.textContent = 'Talk with Knuut';
        btn.classList.remove('active');
        updateStatus('');
        try { if (pc) pc.close(); } catch {}
        pc = null;
        if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
        if (remoteAudioEl) remoteAudioEl.srcObject = null;
        document.querySelectorAll('#voice-bars .vb').forEach(el => {
          el.style.transform = 'scaleY(1)';
          el.style.opacity = '0.5';
        });
      }

      btn.addEventListener('click', function(ev){
        ev.preventDefault();
        if (isActive) stopKnuut(); else startKnuut();
      });
    })();
  </script>

  <script>
    (function() {
      var useRef = React.useRef, useEffect = React.useEffect;
      function Orb(props) {
        var hue = props.hue || 260;
        var containerRef = useRef(null);
        useEffect(function() {
          var container = containerRef.current;
          if (!container) return;
          var canvas = document.createElement('canvas');
          canvas.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;opacity:0.5';
          container.appendChild(canvas);
          var ctx = canvas.getContext('2d');
          var t = 0, raf;
          function resize() { canvas.width = container.offsetWidth; canvas.height = container.offsetHeight; }
          function animate() {
            t += 0.01;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            var cx = canvas.width/2, cy = canvas.height/2, r = Math.min(canvas.width,canvas.height)*0.4;
            var g = ctx.createRadialGradient(cx+Math.sin(t)*40, cy+Math.cos(t)*40, 0, cx, cy, r);
            var h = (hue + t*15) % 360;
            g.addColorStop(0, 'hsla('+h+',70%,60%,0.7)');
            g.addColorStop(0.5, 'hsla('+(h+20)+',70%,50%,0.35)');
            g.addColorStop(1, 'hsla('+(h+40)+',70%,40%,0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI*2);
            ctx.fill();
            raf = requestAnimationFrame(animate);
          }
          resize();
          animate();
          window.addEventListener('resize', resize);
          return function() { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
        }, [hue]);
        return React.createElement('div', { ref: containerRef, style: {width:'100%',height:'100%',position:'relative'} });
      }
      var root = ReactDOM.createRoot(document.getElementById('orb-root'));
      root.render(React.createElement(Orb, { hue: 260 }));
    })();
  </script>
