<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knuut AI — Language Teacher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', monospace;
      background: #0d0d1a;
      color: #e0e0f0;
      overflow-x: hidden;
      min-height: 100vh;
      transition: background 0.3s;
    }
    body.yki-mode { background: #FFFBF0; color: #1a1a1a; }
    body.yki-mode .nav-link, body.yki-mode .subtitle { color: rgba(0,0,0,0.7); }
    body.yki-mode .nav-link:hover { color: #000; }
    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .orb-container {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      overflow: hidden;
    }
    .content-overlay {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      max-width: 800px;
    }
    .nav-row {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
      z-index: 20;
      justify-content: flex-start;
    }
    .nav-link {
      padding: 6px 14px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      text-decoration: none;
      transition: all 0.15s;
      font-family: inherit;
    }
    .nav-link:hover {
      background: rgba(167,139,250,0.2);
      border-color: #a78bfa;
      color: #fff;
    }
    h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a78bfa, #1d9e75);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 2px;
    }
    .subtitle {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }
    .talk-button {
      padding: 18px 40px;
      font-size: 1.3rem;
      font-weight: bold;
      background: linear-gradient(135deg, #a78bfa, #1d9e75);
      color: white;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(167,139,250,0.3);
      font-family: inherit;
      z-index: 20;
    }
    .talk-button:hover {
      transform: scale(1.05);
      box-shadow: 0 12px 40px rgba(167,139,250,0.4);
    }
    .talk-button.active {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      box-shadow: 0 8px 32px rgba(239,68,68,0.4);
    }
    .talk-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    #voice-bars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      margin: 2rem 0;
      height: 50px;
    }
    .vb {
      width: 5px;
      height: 18px;
      background: #1d9e75;
      border-radius: 3px;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }
    .status-text {
      margin-top: 1rem;
      font-size: 0.95rem;
      color: rgba(255,255,255,0.5);
      min-height: 24px;
    }
    .status-text.active {
      color: #1d9e75;
    }
    .mode-tabs {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 4px;
      margin-bottom: 16px;
    }
    body.yki-mode .mode-tabs { background: rgba(0,0,0,0.08); }
    .mode-tab {
      padding: 8px 20px;
      border-radius: 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-family: inherit;
    }
    body.yki-mode .mode-tab { color: rgba(0,0,0,0.5); }
    .mode-tab.active {
      background: linear-gradient(135deg, #a78bfa, #1d9e75);
      color: #fff;
    }
    body.yki-mode .mode-tab.active { background: #6C63FF; }
    .mode-tab:not(.active):hover { color: #fff; }
    body.yki-mode .mode-tab:not(.active):hover { color: #000; }
    .yki-banner {
      display: none;
      background: linear-gradient(135deg, #6C63FF, #5a52e0);
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      margin-bottom: 16px;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .yki-banner.visible { display: flex; flex-wrap: wrap; }
    .yki-banner .timer { font-size: 20px; font-weight: bold; }
    .yki-banner .timer.warn { color: #FF4B4B; animation: pulse 1s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .session-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .session-overlay.visible { display: flex; }
    .overlay-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .overlay-card h2 { font-size: 22px; margin-bottom: 8px; color: #1A1A2E; font-family: system-ui,sans-serif; }
    .overlay-card .badge { font-size: 32px; font-weight: bold; color: #6C63FF; margin: 16px 0; }
    .overlay-check {
      width: 80px; height: 80px; margin: 0 auto 20px;
    }
    .overlay-check circle, .overlay-check path {
      fill: none; stroke: #58CC02; stroke-width: 3;
      stroke-linecap: round; stroke-linejoin: round;
    }
    .overlay-check circle { stroke-dasharray: 283; stroke-dashoffset: 283; animation: drawCircle 0.6s ease forwards; }
    .overlay-check path { stroke-dasharray: 100; stroke-dashoffset: 100; animation: drawCheck 0.4s ease 0.5s forwards; }
    @keyframes drawCircle { to { stroke-dashoffset: 0; } }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }
    .overlay-stats { display: flex; gap: 20px; justify-content: center; margin: 16px 0; flex-wrap: wrap; }
    .overlay-stat { font-size: 14px; color: #6B7280; }
    .overlay-summary { font-style: italic; color: #6B7280; font-size: 14px; max-width: 360px; margin: 0 auto 24px; line-height: 1.5; }
    .overlay-card .btn {
      display: inline-block;
      padding: 14px 28px;
      margin: 8px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      box-shadow: 0 4px 0 #4B44CC;
      transition: transform 0.15s;
    }
    .overlay-card .btn:hover { transform: translateY(-1px); }
    .overlay-card .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #4B44CC; }
    .overlay-card .btn-primary { background: #6C63FF; color: #fff; }
    .overlay-card .btn-success { background: #58CC02; color: #fff; box-shadow: 0 4px 0 #3da001; }
    @media (max-width: 768px) {
      h1 { font-size: 2.2rem; }
      .subtitle { font-size: 0.95rem; }
      .talk-button { padding: 14px 28px; font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav-row">
      <a href="index.html" class="nav-link">Brain Graph</a>
      <a href="dashboard.html" class="nav-link">Agents</a>
      <a href="student-dashboard.html" class="nav-link">My Progress</a>
      <a href="teacher-dashboard.html" class="nav-link">Teacher</a>
    </div>
    <div class="orb-container" id="orb-root"></div>
    <div class="content-overlay">
      <h1>KNUUT AI</h1>
      <p class="subtitle">Your voice teacher — speak any language. Practice with Knuut and get gentle corrections in real time.</p>
      <div id="voice-bars">
        <div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div>
        <div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div>
        <div class="vb"></div><div class="vb"></div><div class="vb"></div><div class="vb"></div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" data-mode="free">Free practice</button>
        <button class="mode-tab" data-mode="yki">YKI exam mode</button>
      </div>
      <div class="yki-banner" id="yki-banner">
        <span>YKI Exam Mode — B1 level</span>
        <span class="timer" id="yki-timer">15:00</span>
      </div>
      <button id="knuut-talk-btn" class="talk-button">Talk with Knuut</button>
      <div id="status-text" class="status-text"></div>
    </div>
  </div>

  <div class="session-overlay" id="session-overlay">
    <div class="overlay-card">
      <svg class="overlay-check" viewBox="0 0 80 80" id="overlay-check">
        <circle cx="40" cy="40" r="36"/>
        <path d="M22 40 L35 53 L58 27"/>
      </svg>
      <h2 id="overlay-title">Session complete!</h2>
      <div class="overlay-stats" id="overlay-stats"></div>
      <p class="overlay-summary" id="overlay-summary"></p>
      <div id="overlay-buttons"></div>
    </div>
  </div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script>
    (function(){
      const btn = document.getElementById('knuut-talk-btn');
      const statusText = document.getElementById('status-text');
      if (!btn) return;

      const token = localStorage.getItem('sb_token') || localStorage.getItem('knuut_token');
      const user = (() => { try { return JSON.parse(localStorage.getItem('sb_user') || localStorage.getItem('knuut_user') || '{}'); } catch { return {}; } })();
      if (!token) {
        location.replace('/login.html?next=' + encodeURIComponent('/knuut.html' + location.search));
        return;
      }
      const urlLearnerId = new URLSearchParams(location.search).get('learner_id');
      const learnerId = urlLearnerId || (user?.role === 'learner' ? user?.id : null);

      function authHeaders() {
        return { 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || localStorage.getItem('knuut_token') || '') };
      }

      let pc, micStream, remoteAudioEl, isActive = false, isStarting = false;
      let sessionTranscript = '';
      let sessionStartTime = 0;
      let examMode = false;
      let ykiTimeLeft = 15 * 60;
      let ykiTimerInterval = null;
      const SERVER_URL = window.location.origin;

      document.querySelectorAll('.mode-tab').forEach((btn) => {
        btn.addEventListener('click', () => {
          if (isActive) return;
          document.querySelectorAll('.mode-tab').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          examMode = btn.dataset.mode === 'yki';
          document.body.classList.toggle('yki-mode', examMode);
          document.getElementById('yki-banner').classList.toggle('visible', examMode && isActive);
        });
      });

      function updateTimerDisplay(secs) {
        const m = Math.floor(secs / 60);
        const s = secs % 60;
        const el = document.getElementById('yki-timer');
        if (el) {
          el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
          el.classList.toggle('warn', secs <= 120);
        }
      }

      function showToast(msg, type) {
        const t = document.createElement('div');
        t.textContent = msg;
        t.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2500);
      }

      async function getSessionFocus() {
        try {
          const res = await fetch('/api/session-focus', { headers: authHeaders() });
          const data = await res.json();
          return data.system_prompt_fragment || '';
        } catch (err) {
          return '';
        }
      }

      async function onSessionEnd() {
        const duration = Math.round((Date.now() - sessionStartTime) / 1000);
        if (sessionTranscript.length < 50) return;

        try {
          const body = {
            transcript: sessionTranscript,
            duration_s: duration,
            learner_language: 'fi',
            is_mock_exam: examMode,
            is_yki_exam: examMode
          };
          if (learnerId) body.learner_id = learnerId;

          const res = await fetch('/api/session-complete', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...authHeaders() },
            body: JSON.stringify(body)
          });
          const result = await res.json();
          console.log('Session saved:', result.summary);

          if (examMode) {
            let ykiResult = null;
            try {
              const scoreRes = await fetch('/api/yki-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', ...authHeaders() },
                body: JSON.stringify({ transcript: sessionTranscript, learner_id: learnerId, episode_id: result.episode_id })
              });
              ykiResult = await scoreRes.json();
            } catch (e) { console.error('YKI score failed:', e); }

            showSessionOverlay(true, result, ykiResult, duration);
          } else {
            showSessionOverlay(false, result, null, duration);
          }
          if (result.topics_updated || result.new_nodes_created) {
            console.log('Brain updated:', result.topics_updated, 'nodes,', result.new_nodes_created, 'new');
          }
        } catch (err) {
          console.error('Failed to save session:', err);
          showSessionOverlay(false, { summary: 'Error saving session' }, null, 0);
        }
        sessionTranscript = '';
      }

      function showSessionOverlay(isYki, result, ykiScore, durationSecs) {
        const overlay = document.getElementById('session-overlay');
        const check = document.getElementById('overlay-check');
        const title = document.getElementById('overlay-title');
        const stats = document.getElementById('overlay-stats');
        const summary = document.getElementById('overlay-summary');
        const buttons = document.getElementById('overlay-buttons');
        check.style.display = isYki ? 'none' : 'block';
        overlay.classList.add('visible');
        const close = () => overlay.classList.remove('visible');
        const esc = (e) => { if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); } };
        document.addEventListener('keydown', esc);
        overlay.onclick = (e) => { if (e.target === overlay) close(); };
        if (isYki && ykiScore) {
          const passed = (ykiScore.yki_result || '').includes('pass') && !(ykiScore.yki_result || '').includes('fail');
          title.textContent = 'Exam complete! Your result: ' + (passed ? 'PASS' : 'FAIL');
          stats.innerHTML = '';
          summary.textContent = result.summary || '';
          summary.style.display = 'block';
          buttons.innerHTML = `
            <a href="/yki-results.html?episode=${result.episode_id}" class="btn btn-primary">See full report</a>
            <a href="/knuut.html" class="btn btn-success">Practice weak areas</a>
          `;
        } else {
          title.textContent = 'Session complete!';
          const m = Math.floor((durationSecs || result.duration_s || 0) / 60);
          const s = (durationSecs || result.duration_s || 0) % 60;
          stats.innerHTML = `
            <span class="overlay-stat">⏱ ${m}m ${s}s</span>
            <span class="overlay-stat">🧠 ${result.topics_updated || 0} topics practiced</span>
            <span class="overlay-stat">✨ ${result.new_nodes_created || 0} new topics</span>
          `;
          stats.style.display = 'flex';
          summary.textContent = result.summary || '';
          summary.style.display = 'block';
          buttons.innerHTML = `
            <a href="/knuut.html" class="btn btn-primary">Practice again</a>
            <a href="/student-dashboard.html" class="btn btn-success">See my progress</a>
          `;
        }
      }

      function hideSessionOverlay() {
        document.getElementById('session-overlay').classList.remove('visible');
      }

      function updateStatus(text, isActive = false) {
        if (statusText) {
          statusText.textContent = text;
          statusText.className = 'status-text' + (isActive ? ' active' : '');
        }
      }

      async function startKnuut(){
        if (isActive || isStarting) return;
        examMode = document.querySelector('.mode-tab[data-mode="yki"]')?.classList.contains('active');
        document.body.classList.toggle('yki-mode', examMode);
        document.getElementById('yki-banner').classList.toggle('visible', examMode);
        ykiTimeLeft = 15 * 60;
        updateTimerDisplay(ykiTimeLeft);
        isStarting = true;
        btn.disabled = true;
        updateStatus(examMode ? 'Connecting (YKI exam mode)...' : 'Connecting...');

        try {
          micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
          updateStatus('Microphone connected');

          pc = new RTCPeerConnection({
            iceServers: [{ urls: ['stun:stun.l.google.com:19302'] }]
          });

          if (!remoteAudioEl) {
            remoteAudioEl = document.createElement('audio');
            remoteAudioEl.autoplay = true;
            remoteAudioEl.playsInline = true;
            document.body.appendChild(remoteAudioEl);
          }

          pc.ontrack = (event) => {
            const audioEl = document.createElement('audio');
            audioEl.autoplay = true;
            audioEl.playsInline = true;
            audioEl.srcObject = event.streams[0];
            document.body.appendChild(audioEl);
            audioEl.play()
              .then(() => updateStatus('Listening...', true))
              .catch(() => {});
            try {
              const bars = document.querySelectorAll('#voice-bars .vb');
              const ctx2 = new (window.AudioContext || window.webkitAudioContext)();
              const src2 = ctx2.createMediaStreamSource(event.streams[0]);
              const analyser2 = ctx2.createAnalyser();
              analyser2.fftSize = 256;
              src2.connect(analyser2);
              const buf2 = new Uint8Array(analyser2.frequencyBinCount);
              const tick2 = () => {
                analyser2.getByteFrequencyData(buf2);
                const level2 = buf2.reduce((a,b)=>a+b,0) / (buf2.length*255);
                bars.forEach((el, i) => {
                  const scale = 0.5 + Math.min(1, level2*5) * (0.9 + 0.5*Math.cos((Date.now()/100)+i));
                  el.style.transform = 'scaleY(' + scale.toFixed(2) + ')';
                  el.style.transformOrigin = 'bottom';
                  el.style.opacity = (0.8 + level2*0.2).toFixed(2);
                });
                requestAnimationFrame(tick2);
              };
              tick2();
            } catch {}
          };

          pc.oniceconnectionstatechange = () => {
            if (pc.iceConnectionState === 'connected') updateStatus('Connected', true);
          };

          micStream.getTracks().forEach(t => pc.addTrack(t, micStream));

          try {
            const bars = document.querySelectorAll('#voice-bars .vb');
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const src = ctx.createMediaStreamSource(micStream);
            const analyser = ctx.createAnalyser();
            analyser.fftSize = 256;
            src.connect(analyser);
            const buf = new Uint8Array(analyser.frequencyBinCount);
            const tick = () => {
              analyser.getByteFrequencyData(buf);
              const level = buf.reduce((a,b)=>a+b,0) / (buf.length*255);
              bars.forEach((el, i) => {
                const scale = 0.4 + Math.min(1, level*4) * (0.6 + 0.4*Math.sin((Date.now()/120)+i));
                el.style.transform = 'scaleY(' + scale.toFixed(2) + ')';
                el.style.transformOrigin = 'bottom';
                el.style.opacity = (0.7 + level*0.3).toFixed(2);
              });
              requestAnimationFrame(tick);
            };
            tick();
          } catch {}

          sessionTranscript = '';
          sessionStartTime = Date.now();

          const channel = pc.createDataChannel('oai-events');
          channel.onopen = async () => {
            try {
                  channel.send(JSON.stringify({
                type: 'response.create',
                response: { modalities: ['audio','text'], conversation: 'auto' }
              }));
            } catch (e) {}
          };
          channel.onmessage = (event) => {
            try {
              const obj = JSON.parse(event.data || '{}');
              const t = obj.transcript || obj.item?.transcript;
              if (obj.type === 'response.audio_transcript.done' && t) {
                sessionTranscript += '\n[Knuut]: ' + t;
              }
              if (obj.type === 'conversation.item.input_audio_transcription.completed' && t) {
                sessionTranscript += '\n[Learner]: ' + t;
              }
              if (obj.type === 'response.output_item.done' && obj.item?.transcript) {
                sessionTranscript += '\n[Knuut]: ' + obj.item.transcript;
              }
            } catch (e) {}
          };

          try { pc.addTransceiver('audio', { direction: 'sendrecv' }); } catch {}

          const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: false });
          await pc.setLocalDescription(offer);

          const focusFragment = await getSessionFocus();
          const headers = {
            'Content-Type': 'application/sdp',
            'X-Session-Focus': focusFragment || '',
            'X-Exam-Mode': examMode ? 'true' : 'false'
          };
          const resp = await fetch(SERVER_URL + '/api/session', {
            method: 'POST',
            headers,
            body: offer.sdp || ''
          });

          if (!resp.ok) {
            const errText = await resp.text();
            throw new Error('Session failed: ' + errText);
          }

          const answerSdp = await resp.text();
          await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
          try { await remoteAudioEl.play(); } catch {}

          isActive = true;
          btn.textContent = 'Stop Knuut';
          btn.classList.add('active');
          updateStatus('Ready to talk', true);

          if (examMode) {
            ykiTimerInterval = setInterval(() => {
              ykiTimeLeft--;
              updateTimerDisplay(ykiTimeLeft);
              if (ykiTimeLeft === 120) showToast('2 minutes remaining', 'warning');
              if (ykiTimeLeft <= 0) {
                clearInterval(ykiTimerInterval);
                stopKnuut();
              }
            }, 1000);
          }
        } catch (e) {
          console.error(e);
          stopKnuut();
          updateStatus('Error: ' + (e && e.message ? e.message : 'Unknown'));
          alert('Could not start: ' + (e && e.message ? e.message : e));
        } finally {
          isStarting = false;
          btn.disabled = false;
        }
      }

      function stopKnuut(){
        if (ykiTimerInterval) { clearInterval(ykiTimerInterval); ykiTimerInterval = null; }
        document.getElementById('yki-banner').classList.remove('visible');
        document.body.classList.remove('yki-mode');
        onSessionEnd();
        isActive = false;
        btn.textContent = 'Talk with Knuut';
        btn.classList.remove('active');
        updateStatus('');
        try { if (pc) pc.close(); } catch {}
        pc = null;
        if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
        if (remoteAudioEl) remoteAudioEl.srcObject = null;
        document.querySelectorAll('#voice-bars .vb').forEach(el => {
          el.style.transform = 'scaleY(1)';
          el.style.opacity = '0.5';
        });
      }

      btn.addEventListener('click', function(ev){
        ev.preventDefault();
        if (isActive) stopKnuut(); else startKnuut();
      });
    })();
  </script>

  <script>
    (function() {
      var useRef = React.useRef, useEffect = React.useEffect;
      function Orb(props) {
        var hue = props.hue || 260;
        var containerRef = useRef(null);
        useEffect(function() {
          var container = containerRef.current;
          if (!container) return;
          var canvas = document.createElement('canvas');
          canvas.style.cssText = 'width:100%;height:100%;position:absolute;top:0;left:0;opacity:0.5';
          container.appendChild(canvas);
          var ctx = canvas.getContext('2d');
          var t = 0, raf;
          function resize() { canvas.width = container.offsetWidth; canvas.height = container.offsetHeight; }
          function animate() {
            t += 0.01;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            var cx = canvas.width/2, cy = canvas.height/2, r = Math.min(canvas.width,canvas.height)*0.4;
            var g = ctx.createRadialGradient(cx+Math.sin(t)*40, cy+Math.cos(t)*40, 0, cx, cy, r);
            var h = (hue + t*15) % 360;
            g.addColorStop(0, 'hsla('+h+',70%,60%,0.7)');
            g.addColorStop(0.5, 'hsla('+(h+20)+',70%,50%,0.35)');
            g.addColorStop(1, 'hsla('+(h+40)+',70%,40%,0)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI*2);
            ctx.fill();
            raf = requestAnimationFrame(animate);
          }
          resize();
          animate();
          window.addEventListener('resize', resize);
          return function() { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
        }, [hue]);
        return React.createElement('div', { ref: containerRef, style: {width:'100%',height:'100%',position:'relative'} });
      }
      var root = ReactDOM.createRoot(document.getElementById('orb-root'));
      root.render(React.createElement(Orb, { hue: 260 }));
    })();
  </script>
</body>
