<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knuut — Learn</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { knuut: '#6C63FF', knuutDark: '#5046e5' } } } }</script>
  <style>
    @keyframes cardIn { from { opacity: 0; transform: translateY(14px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    .animate-card-in { animation: cardIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both; }
  </style>
</head>
<body class="min-h-screen bg-[#F0EFFE] text-gray-800">
  <nav class="bg-white border-b border-purple-100 px-4 py-3 flex items-center gap-2 sticky top-0 z-50">
    <a href="student-dashboard.html" class="text-knuut font-extrabold tracking-wider">KNUUT</a>
    <a href="student-dashboard.html" class="ml-auto text-sm text-gray-500 hover:text-knuut">← Dashboard</a>
  </nav>

  <main class="max-w-2xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-2">📖 Learn</h1>
    <p class="text-gray-600 mb-8">Short theory bites. Practice with Knuut to reinforce.</p>

    <div id="cards-container" class="space-y-6">
      <!-- LearnCard components rendered here -->
    </div>
  </main>

  <script>
    const LEARN_CARDS = [
      { title: 'Partitive case', explanation: 'Use the partitive when the action is incomplete or the amount is undefined. It often ends in -a/-ä, -ta/-tä, or -a/-ä after a vowel.', examples: ['Kahvia, kiitos. (Some coffee, please.)', 'Minulla on omenaa. (I have some apples.)'] },
      { title: 'Verb types', explanation: 'Finnish verbs belong to 6 types based on the stem. Type 1: -a/-ä → -an (puhua → puhun). Type 2: -da/-dä → -n (syödä → syön).', examples: ['Minä puhun suomea. (I speak Finnish.)', 'Hän syö leipää. (He/She eats bread.)'] },
      { title: 'Possessive suffixes', explanation: 'You can add -ni (my), -si (your), -nsa/-nsä (his/her) to nouns. The stem may change.', examples: ['Kotini (my home)', 'Ystäväsi (your friend)'] },
    ];

    const container = document.getElementById('cards-container');
    container.innerHTML = LEARN_CARDS.map((card, i) => `
      <div class="bg-white rounded-2xl shadow-sm border-2 border-purple-100 p-6 md:p-8 animate-card-in hover:shadow-md transition-shadow duration-300" style="animation-delay: ${i * 0.1}s">
        <h2 class="text-xl font-bold text-gray-900 mb-3">${escapeHtml(card.title)}</h2>
        <p class="text-gray-600 mb-4">${escapeHtml(card.explanation)}</p>
        <div class="space-y-2 mb-6">
          ${(card.examples || []).map(ex => `<p class="text-sm text-gray-700 bg-gray-50 rounded-lg px-3 py-2">${escapeHtml(ex)}</p>`).join('')}
        </div>
        <a href="knuut.html?mode=learn&topic=${encodeURIComponent(card.title)}" class="block w-full py-3 bg-knuut text-white font-bold rounded-xl hover:bg-knuutDark transition text-center">
          Practice with Knuut →
        </a>
      </div>
    `).join('');

    function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  </script>
</body>
</html>
