<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knuut — Teacher Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #F9F7F4;
      color: #1A1A2E;
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    nav { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
    .nav-link {
      padding: 10px 16px;
      border-radius: 12px;
      border: 1px solid #E5E7EB;
      background: #fff;
      color: #6B7280;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.2s;
      font-weight: 500;
    }
    .nav-link:hover { background: rgba(108,99,255,0.08); border-color: #6C63FF; color: #6C63FF; }
    header {
      margin-bottom: 28px;
    }
    .greeting { font-size: 24px; font-weight: 700; color: #1A1A2E; }
    .date-today { font-size: 14px; color: #6B7280; margin-top: 4px; }
    .stat-pills {
      display: flex;
      gap: 16px;
      margin-top: 20px;
      flex-wrap: wrap;
    }
    .stat-pill {
      padding: 12px 20px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border-radius: 12px;
      font-size: 14px;
      color: #6B7280;
    }
    .stat-pill strong { color: #1A1A2E; }
    .learner-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    @media (max-width: 700px) { .learner-grid { grid-template-columns: 1fr; } }
    @keyframes popIn {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.15); }
      100% { transform: scale(1); opacity: 1; }
    }
    .learner-card {
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border-radius: 16px;
      padding: 20px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      border-left: 4px solid #E5E7EB;
      animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .learner-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.08); }
    .learner-card.active { border-left-color: #58CC02; }
    .learner-card.idle { border-left-color: #FFC800; }
    .learner-card.inactive { border-left-color: #FF4B4B; }
    .learner-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .learner-avatar { width: 44px; height: 44px; border-radius: 50%; background: #6C63FF; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
    .learner-name { font-weight: 600; font-size: 16px; }
    .learner-cefr { padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 700; background: rgba(108,99,255,0.15); color: #6C63FF; margin-left: auto; }
    .skill-dots { display: flex; gap: 4px; margin-bottom: 12px; }
    .skill-dot { width: 8px; height: 8px; border-radius: 50%; }
    .learner-meta { font-size: 12px; color: #6B7280; }
    .learner-weakest { display: inline-block; padding: 4px 10px; background: #E5E7EB; border-radius: 8px; font-size: 11px; margin-top: 8px; }
    .layout { display: flex; gap: 24px; }
    .main { flex: 1; }
    .side-panel {
      width: 360px;
      background: #fff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border-radius: 16px;
      padding: 24px;
      max-height: 600px;
      overflow-y: auto;
      display: none;
    }
    .side-panel.visible {
      display: block;
      animation: slidePanel 0.3s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes slidePanel {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }
    .panel-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .panel-meta { font-size: 13px; color: #6B7280; margin-bottom: 20px; }
    .panel-bar { margin-bottom: 12px; }
    .panel-bar .label { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 4px; }
    .panel-bar .track { height: 8px; background: #E5E7EB; border-radius: 4px; overflow: hidden; }
    .panel-bar .fill { height: 100%; border-radius: 4px; }
    .panel-bar .fill.high { background: #58CC02; }
    .panel-bar .fill.medium { background: #FFC800; }
    .panel-bar .fill.low { background: #FF4B4B; }
    .panel-sessions { margin-top: 20px; }
    .panel-session {
      padding: 12px;
      margin-bottom: 10px;
      background: #F9F7F4;
      border-radius: 10px;
      font-size: 13px;
    }
    .panel-session-date { font-size: 11px; color: #6B7280; margin-bottom: 4px; }
    .btn-session {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: #6C63FF;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 0 #4B44CC;
    }
    .btn-session:hover { opacity: 0.95; }
  </style>
</head>
<body>
  <div class="container">
    <nav>
      <a href="index.html" class="nav-link">Brain Graph</a>
      <a href="dashboard.html" class="nav-link">Agents</a>
      <a href="student-dashboard.html" class="nav-link">Student view</a>
      <a href="#" class="nav-link" id="logout-link">Log out</a>
    </nav>

    <header>
      <div class="greeting">Good morning, <span id="teacher-name">—</span></div>
      <div class="date-today" id="date-today"></div>
      <div class="stat-pills">
        <span class="stat-pill">👥 <strong id="total-learners">0</strong> learners</span>
        <span class="stat-pill">📚 <strong id="total-sessions">0</strong> sessions this week</span>
        <span class="stat-pill">⚠ <strong id="need-attention">0</strong> need attention</span>
      </div>
    </header>

    <div class="layout">
      <div class="main">
        <h2 style="font-size:14px;font-weight:600;color:#6B7280;margin-bottom:16px;">Learners</h2>
        <div class="learner-grid" id="learner-grid"></div>
      </div>

      <div class="side-panel" id="side-panel">
        <div class="panel-title" id="panel-learner-name">—</div>
        <div class="panel-meta" id="panel-meta"></div>
        <div id="panel-bars"></div>
        <div class="panel-sessions" id="panel-sessions"></div>
        <button class="btn-session" id="btn-start-session">Start session with learner</button>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('sb_token') || localStorage.getItem('knuut_token');
    const user = (() => {
      try {
        return JSON.parse(localStorage.getItem('sb_user') || localStorage.getItem('knuut_user') || '{}');
      } catch { return {}; }
    })();
    if (!token || user?.role !== 'teacher') {
      location.replace('/login.html?next=' + encodeURIComponent('/teacher-dashboard.html'));
    }

    function authHeaders() {
      return { 'Authorization': 'Bearer ' + (localStorage.getItem('sb_token') || localStorage.getItem('knuut_token') || '') };
    }

    document.getElementById('logout-link')?.addEventListener('click', (e) => {
      e.preventDefault();
      ['knuut_token', 'knuut_user', 'sb_token', 'sb_user'].forEach(k => localStorage.removeItem(k));
      location.replace('/login.html');
    });

    document.getElementById('teacher-name').textContent = user?.name || 'Teacher';
    const now = new Date();
    document.getElementById('date-today').textContent = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

    let learnersData = [];
    const weekAgo = new Date(now.getTime() - 7 * 24 * 60 * 60 * 1000);

    function getStatus(lastSession) {
      if (!lastSession) return 'inactive';
      const d = new Date(lastSession);
      const days = (now - d) / (24 * 60 * 60 * 1000);
      if (days < 3) return 'active';
      if (days < 7) return 'idle';
      return 'inactive';
    }

    async function loadLearners() {
      try {
        const res = await fetch('/api/learners', { headers: authHeaders() });
        learnersData = await res.json();
        if (!Array.isArray(learnersData)) learnersData = [];

        const totalSessions = learnersData.reduce((s, l) => s + (l.session_count || 0), 0);
        const sessionsThisWeek = learnersData.reduce((s, l) => {
          const last = l.last_session ? new Date(l.last_session) : null;
          return s + (last && last >= weekAgo ? 1 : 0);
        }, 0);
        const needAttention = learnersData.filter((l) => {
          const last = l.last_session ? new Date(l.last_session) : null;
          return !last || (now - last) / (24 * 60 * 60 * 1000) > 7;
        }).length;

        document.getElementById('total-learners').textContent = learnersData.length;
        document.getElementById('total-sessions').textContent = learnersData.reduce((s, l) => s + (l.session_count || 0), 0);
        document.getElementById('need-attention').textContent = needAttention;

        const grid = document.getElementById('learner-grid');
        grid.innerHTML = learnersData.map((l, idx) => {
          const last = l.last_session ? new Date(l.last_session) : null;
          const daysAgo = last ? Math.floor((now - last) / (24 * 60 * 60 * 1000)) : null;
          const status = getStatus(l.last_session);
          const initials = (l.name || '—').split(' ').map((w) => w[0]).join('').slice(0, 2).toUpperCase();
          return `
            <div class="learner-card ${status}" data-id="${l.id}" style="animation-delay:${idx * 0.05}s">
              <div class="learner-head">
                <div class="learner-avatar">${initials}</div>
                <span class="learner-name">${l.name}</span>
                <span class="learner-cefr">${l.cefr_level || '—'}</span>
              </div>
              <div class="skill-dots learner-dots-${l.id}"></div>
              <div class="learner-meta">Last active: ${daysAgo != null ? daysAgo + ' days ago' : 'never'}</div>
              <div class="learner-weakest weakest-${l.id}">—</div>
            </div>`;
        }).join('');

        grid.querySelectorAll('.learner-card').forEach((card) => {
          card.addEventListener('click', () => showLearnerPanel(card.dataset.id));
        });

        learnersData.forEach((l) => fetchWeakestAndDots(l.id));
      } catch (err) {
        console.error(err);
        document.getElementById('learner-grid').innerHTML = '<div style="color:#6B7280;padding:24px">Could not load learners.</div>';
      }
    }

    async function fetchWeakestAndDots(learnerId) {
      try {
        const res = await fetch(`/api/learners/${learnerId}/progress`, { headers: authHeaders() });
        const data = await res.json();
        const nodes = data.nodes || [];
        const weakest = nodes[0]?.label;
        const el = document.querySelector(`.weakest-${learnerId}`);
        if (el && weakest) el.textContent = weakest;

        const dotsEl = document.querySelector(`.learner-dots-${learnerId}`);
        if (dotsEl && nodes.length > 0) {
          const top5 = nodes.slice(0, 5);
          dotsEl.innerHTML = top5.map((n) => {
            const c = n.confidence ?? 0.5;
            const cls = c > 0.8 ? 'high' : c >= 0.4 ? 'medium' : 'low';
            return `<span class="skill-dot fill ${cls}" style="background:${c > 0.8 ? '#58CC02' : c >= 0.4 ? '#FFC800' : '#FF4B4B'}"></span>`;
          }).join('');
        }
      } catch (e) {}
    }

    async function showLearnerPanel(learnerId) {
      document.querySelectorAll('.learner-card').forEach((c) => c.classList.remove('selected'));
      document.querySelector(`.learner-card[data-id="${learnerId}"]`)?.classList.add('selected');

      const learner = learnersData.find((l) => l.id === learnerId);
      document.getElementById('panel-learner-name').textContent = learner?.name || '—';
      document.getElementById('panel-meta').textContent = `${learner?.cefr_level || '—'} · ${learner?.mother_tongue || '—'}`;
      document.getElementById('btn-start-session').textContent = 'Start session with ' + (learner?.name || 'learner');
      document.getElementById('btn-start-session').onclick = () => { window.location.href = '/knuut.html?learner_id=' + learnerId; };

      const panel = document.getElementById('side-panel');
      panel.classList.add('visible');
      document.getElementById('panel-sessions').innerHTML = '<div style="color:#6B7280">Loading...</div>';
      document.getElementById('panel-bars').innerHTML = '';

      try {
        const res = await fetch(`/api/learners/${learnerId}/progress`, { headers: authHeaders() });
        const data = await res.json();
        const nodes = data.nodes || [];
        const episodes = data.episodes || [];

        document.getElementById('panel-bars').innerHTML = nodes.slice(0, 6).map((n) => {
          const c = n.confidence ?? 0.5;
          const pct = Math.round(c * 100);
          const cls = c > 0.8 ? 'high' : c >= 0.4 ? 'medium' : 'low';
          return `
            <div class="panel-bar">
              <div class="label"><span>${n.label}</span><span>${pct}%</span></div>
              <div class="track"><div class="fill ${cls}" style="width:${pct}%"></div></div>
            </div>`;
        }).join('');

        const recent = episodes.slice(0, 5);
        document.getElementById('panel-sessions').innerHTML = recent.length > 0
          ? recent.map((e) => `
              <div class="panel-session">
                <div class="panel-session-date">${new Date(e.created_at).toLocaleDateString('fi-FI')}</div>
                <div>${e.summary || '—'}</div>
              </div>`).join('')
          : '<div style="color:#6B7280">No sessions yet.</div>';
      } catch (err) {
        document.getElementById('panel-sessions').innerHTML = '<div style="color:#FF4B4B">Could not load.</div>';
      }
    }

    loadLearners();
  </script>
</body>
</html>
